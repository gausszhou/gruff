name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - run: go run github.com/google/osv-scanner/cmd/osv-scanner@latest -r .
      - run: go run go.uber.org/nilaway/cmd/nilaway@latest -include-pkgs "github.com/gausszhou/gruff/..." ./...
